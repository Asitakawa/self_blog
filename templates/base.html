{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}个人简历{% endblock %}</title>
    
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Background Images -->
    <div class="background-container">
        <div class="background-image background-1 active" style="background-image: url('{% static "images/back_1.jpg" %}');"></div>
        <div class="background-image background-2" style="background-image: url('{% static "images/back_2_Abandoned.png" %}');"></div>
    </div>

    <!-- 全局侧边栏导航 -->
    {% include 'resume/sidebar.html' %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5.3.8 JS Bundle with Popper -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    
    <!-- Custom JavaScript -->
    <script src="{% static 'js/main.js' %}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
