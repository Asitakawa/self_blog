{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="max-age=86400, public">
    <title>{% block title %}个人简历{% endblock %}</title>
    
    <!-- DNS预取和预连接优化 -->
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="preconnect" href="https://cdn.bootcdn.net" crossorigin>
    
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Bootstrap Icons - 使用国内CDN加速 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <!-- Font Awesome 6.5.1 - 使用国内CDN加速 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Background Images -->
    <div class="background-container">
        <div class="background-image background-1 active" style="background-image: url('{% static "images/back_1.jpg" %}');"></div>
        <div class="background-image background-2" style="background-image: url('{% static "images/back_2.png" %}');"></div>
    </div>

    <!-- 全局侧边栏导航 -->
    {% include 'resume/sidebar.html' %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>Made with ❤️ by Asitakawa | Powered by Bootstrap & Django</p>
        </div>
    </footer>

    <!-- Bootstrap 5.3.8 JS Bundle with Popper -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    
    <!-- Custom JavaScript -->
    <script src="{% static 'js/main.js' %}"></script>
    
    {% block extra_js %}{% endblock %}

    <style>
        .site-footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            color: #4a5568;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        .site-footer p {
            margin: 0;
        }
        
        .site-footer .footer-content {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 30px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
    </style>
</body>
</html>
